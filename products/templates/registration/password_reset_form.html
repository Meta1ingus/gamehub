{% extends "base.html" %}
{% load form_extras %}
{% block title %}Reset Password{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-4">

        <div class="gamerbay-card p-4">

            <h2 class="fw-bold mb-4 text-center text-white">Reset Password</h2>

            <form method="post">
                {% csrf_token %}

                <!-- Email Field -->
                <div class="mb-3">
                    <label class="form-label text-light">Email Address</label>
                    {{ form.email|add_class:"form-control gamerbay-input" }}
                </div>

                <button type="submit" class="btn gamerbay-btn-primary w-100 mt-3">
                    Send Reset Email
                </button>
            </form>

        </div>

    </div>
</div>

{% endblock %}
