{% extends "base.html" %}

{% block title %}Platforms{% endblock %}

{% block content %}
<div class="mb-5">
    <h1 class="fw-bold mb-2">Platforms</h1>
    <p class="text-muted">Browse all available gaming platforms.</p>
</div>

<div class="row">
    {% for platform in platforms %}
    <div class="col-md-3 mb-3">
        <a href="{% url 'platform_detail' platform.slug %}" class="text-decoration-none">
            <div class="card text-white shadow-sm"
                 style="
                    height: 120px;
                    border-radius: 8px;
                    overflow: hidden;
                    {% if platform.image %}
                        background: url('{{ platform.image.url }}') center/cover no-repeat;
                    {% else %}
                        background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
                    {% endif %}
                 ">
                <div class="card-body d-flex align-items-center justify-content-center"
                     style="background: rgba(0,0,0,0.45);">
                    <h5 class="fw-bold mb-0">{{ platform.name }}</h5>
                </div>
            </div>
        </a>
    </div>
    {% endfor %}
</div>

{% endblock %}
