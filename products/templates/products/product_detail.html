{% extends 'base.html' %}

{% block content %}

<a href="{% url 'product_list' %}" class="btn btn-outline-secondary mb-3">← Back to Storefront</a>

<div class="row mt-4">
    <div class="col-md-6">

        {% if game.image %}
        <img src="{{ game.image.url }}" class="img-fluid rounded mb-4" alt="{{ game.title }}">
        {% else %}
        <img src="https://via.placeholder.com/600x400?text=No+Image" class="img-fluid rounded mb-4">
        {% endif %}

    </div>

    <div class="col-md-6">

        {% if game.featured %}
            <span class="badge bg-warning text-dark mb-2">Featured</span>
        {% endif %}

        <h1>{{ game.title }}</h1>

        <p class="text-muted">
            <a href="{% url 'platform_detail' game.platform.slug %}" class="text-decoration-none">
                {{ game.platform }}
            </a>
            •
            <a href="{% url 'genre_detail' game.genre.slug %}" class="text-decoration-none">
                {{ game.genre }}
            </a>
        </p>

        <h3 class="text-success mb-3">£{{ game.price }}</h3>

        <p>{{ game.description }}</p>

        <button class="btn btn-primary btn-lg mt-3">Add to Cart</button>
    </div>
</div>

{% endblock %}
