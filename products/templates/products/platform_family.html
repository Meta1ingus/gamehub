{% extends "base.html" %}
{% load static %}

{% block content %}

<h1 class="fw-bold mb-4">{{ family.name }}</h1>

<a href="{% url 'home' %}" class="btn btn-outline-secondary mb-3">
    ← Back to Home
</a>

<div class="row g-3">
    {% for platform in platforms %}
    <div class="col-6 col-sm-4 col-md-3 col-lg-2">
        <a href="{% url 'product_list' %}?platform={{ platform.slug }}" class="text-decoration-none">
            <div class="card card-tile h-100 text-center shadow-sm p-3">
                <img src="{% static 'core/platforms/' %}{{ platform.slug }}.svg" class="img-fluid mb-2"
                    alt="{{ platform.name }}">
                <h6 class="mb-0">
                    {{ platform.name }}
                    <small class="text-muted">({{ platform.game_count }})</small>
                </h6>
            </div>
        </a>
    </div>
    {% endfor %}
</div>

{% endblock %}
