{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="family-{{ family.slug }}">

    <h1 class="fw-bold mb-4">{{ family.name }}</h1>

    <a href="{% url 'home' %}" class="btn btn-outline-secondary mb-4">
        ← Back to Home
    </a>

    <div class="row g-4">
        {% for platform in platforms %}
        <div class="col-6 col-sm-4 col-md-3 col-lg-2">
            <a href="{% url 'product_list' %}?platform={{ platform.slug }}" class="text-decoration-none">
                <div class="platform-tile">
                    <div class="platform-icon-wrapper">
                        <img src="{% static 'core/platforms/' %}{{ platform.slug }}.svg"
                             alt="{{ platform.name }}"
                             class="platform-icon">
                    </div>

                    <div class="platform-label">
                        {{ platform.name }}
                        <small class="text-muted">({{ platform.game_count }})</small>
                    </div>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>

</div>

{% endblock %}
